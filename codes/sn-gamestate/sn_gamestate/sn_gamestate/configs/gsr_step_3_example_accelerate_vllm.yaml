# Step 3 accelerate config with vLLM AWQ backend for jersey_and_role
defaults:
  - gsr_step_3_example_accelerate
  - _self_

experiment_subname: "step_3_vllm"

qwen_7b_vllm_model_path: "${model_dir}/jn/Qwen2.5-VL-7B-Instruct-AWQ"

# step2 pklz already has reid embeddings — skip reid to save GPU time and VRAM
pipeline:
  - pitch
  - calibration
  - apply_camera_params
  - legibility
  - jersey_and_role
  - remove_outside
  - tracklet_agg
  - concat_tracklets_by_jn
  - concat_tracklets_by_reid
  - tracklet_agg
  - team
  - team_side

modules:
  jersey_and_role:
    batch_size: 4
    cfg:
      use_vllm: true
      vllm_model_path: "${qwen_7b_vllm_model_path}"
      vllm_quantization: awq
      vllm_gpu_memory_utilization: 0.80
      vllm_max_model_len: 4096  # role uses 2 images; single prompt can exceed 2048 tokens
      vllm_enforce_eager: false
      max_new_tokens: 32
      use_legibility_filter: true
      downsample_factor: 4
